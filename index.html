<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

/* START SCREEN */
#startScreen {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(#6edfff,#cfffff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.aeroPerson {
  font-size:40px;
  animation:float 2s infinite ease-in-out;
}

@keyframes float {
  0% { transform:translateY(0px); }
  50% { transform:translateY(-20px); }
  100% { transform:translateY(0px); }
}

button {
  padding:15px 30px;
  font-size:20px;
  margin-top:20px;
}

/* MOBILE BUTTONS */
#controls {
  position:absolute;
  bottom:20px;
  left:20px;
}
.controlBtn {
  width:60px;
  height:60px;
  margin:5px;
  font-size:20px;
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="aeroPerson">🌿 Welcome 🌿</div>
  <button onclick="startGame()">Play</button>
</div>

<div id="controls">
  <button class="controlBtn" onclick="move('w')">↑</button><br>
  <button class="controlBtn" onclick="move('a')">←</button>
  <button class="controlBtn" onclick="move('s')">↓</button>
  <button class="controlBtn" onclick="move('d')">→</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let started = false;

function startGame(){
  document.getElementById("startScreen").style.display = "none";
  started = true;
}

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87e8ff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1.2));
scene.add(new THREE.AmbientLight(0xaaffff,0.6));

// PLAYER (Roblox-style with legs)
const player = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,0.5),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
body.position.y = 2;

const head = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,0.8,0.8),
  new THREE.MeshStandardMaterial({color:0xffe0bd})
);
head.position.y = 3.2;

const leg1 = new THREE.Mesh(
  new THREE.BoxGeometry(0.3,1,0.3),
  new THREE.MeshStandardMaterial({color:0x00ffff})
);
leg1.position.set(-0.2,1,0);

const leg2 = leg1.clone();
leg2.position.set(0.2,1,0);

player.add(body, head, leg1, leg2);
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x55ff88})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// RIVER
const river = new THREE.Mesh(
  new THREE.PlaneGeometry(20,200),
  new THREE.MeshStandardMaterial({
    color:0x00ccff,
    transparent:true,
    opacity:0.7
  })
);
river.rotation.x = -Math.PI/2;
river.position.z = -20;
scene.add(river);

// BUBBLES
let bubbles=[];
for(let i=0;i<30;i++){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(0.6,16,16),
    new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.4})
  );
  b.position.set(
    (Math.random()-0.5)*100,
    Math.random()*10+2,
    (Math.random()-0.5)*100
  );
  scene.add(b);
  bubbles.push(b);
}

// CONTROLS
let keys={};

function move(key){
  keys[key]=true;
  setTimeout(()=>keys[key]=false,100);
}

window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// CAMERA
let yaw=0;

// WALK ANIMATION
let walkTime = 0;

function animate(){
  requestAnimationFrame(animate);

  if(!started){
    renderer.render(scene,camera);
    return;
  }

  let moving = false;

  if(keys["w"]){ player.position.z -= 0.2; moving=true; }
  if(keys["s"]){ player.position.z += 0.2; moving=true; }
  if(keys["a"]){ player.position.x -= 0.2; moving=true; }
  if(keys["d"]){ player.position.x += 0.2; moving=true; }

  // WALK ANIMATION
  if(moving){
    walkTime += 0.2;
    leg1.rotation.x = Math.sin(walkTime) * 0.8;
    leg2.rotation.x = -Math.sin(walkTime) * 0.8;
  }

  // GRAVITY
  if(player.position.y > 1){
    player.position.y -= 0.05;
  } else {
    player.position.y = 1;
  }

  // RIVER FLOW
  if(
    Math.abs(player.position.x - river.position.x) < 10 &&
    Math.abs(player.position.z - river.position.z) < 100
  ){
    player.position.z += 0.5; // pushed forward
  }

  // BUBBLE FLOAT
  bubbles.forEach(b=>{
    b.position.y += Math.sin(Date.now()*0.002 + b.position.x)*0.02;
  });

  // CAMERA FOLLOW
  camera.position.set(player.position.x, player.position.y + 5, player.position.z + 8);
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
