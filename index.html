<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }
#phoneBtn {position:absolute;top:20px;right:20px;}
#phoneUI {display:none;position:absolute;bottom:80px;right:20px;width:260px;height:460px;border-radius:60px;background:linear-gradient(#6edfff,#004cff);padding:20px;}
.app {width:60px;height:60px;border-radius:20px;background:white;display:inline-flex;align-items:center;justify-content:center;margin:8px;}
</style>
</head>
<body>

<button id="phoneBtn" onclick="phoneUI.style.display='block'">📱</button>
<div id="phoneUI">
<div class="app" onclick="teleportHouse()">🏠</div>
<div class="app" onclick="phoneUI.style.display='none'">❌</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87e8ff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x88ccff,1));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ccff})
);
player.position.y=1;
scene.add(player);

let firstPerson=false;
let yaw=0, pitch=0;

// GROUND
let ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x66ffcc})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

//////////////////////////////
// 🏠 2 STORY HOUSE
//////////////////////////////
let house=new THREE.Group();
house.position.set(50,0,0);
scene.add(house);

// FLOOR 1
house.add(new THREE.Mesh(
 new THREE.BoxGeometry(20,1,20),
 new THREE.MeshStandardMaterial({color:0xffffff})
));

// FLOOR 2
let floor2=new THREE.Mesh(
 new THREE.BoxGeometry(20,1,20),
 new THREE.MeshStandardMaterial({color:0xccffee})
);
floor2.position.y=10;
house.add(floor2);

// WALLS
function wall(x,y,z,w,h,d){
 let m=new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color:0xccffff})
 );
 m.position.set(x,y,z);
 house.add(m);
}
wall(0,5,-10,20,10,1);
wall(0,5,10,20,10,1);
wall(-10,5,0,1,10,20);
wall(10,5,0,1,10,20);

// STAIRS
for(let i=0;i<12;i++){
 let step=new THREE.Mesh(
  new THREE.BoxGeometry(2,0.5,1),
  new THREE.MeshStandardMaterial({color:0xffffff})
 );
 step.position.set(-8+i*0.6,1+i*0.5,5);
 house.add(step);
}

// 🛏 BEDROOM (UPSTAIRS)
let bed=new THREE.Mesh(
 new THREE.BoxGeometry(4,1,6),
 new THREE.MeshStandardMaterial({color:0x00ccff})
);
bed.position.set(-5,11,0);
house.add(bed);

// 🍽 KITCHEN (DOWNSTAIRS)
let table=new THREE.Mesh(
 new THREE.BoxGeometry(4,1,4),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
table.position.set(0,1,5);
house.add(table);

// 📺 TV
const tvVideo=document.createElement("video");
tvVideo.src="waterfall.mp4";
tvVideo.loop=true;
tvVideo.muted=true;
tvVideo.play();

let tv=new THREE.Mesh(
 new THREE.PlaneGeometry(6,4),
 new THREE.MeshBasicMaterial({map:new THREE.VideoTexture(tvVideo)})
);
tv.position.set(5,4,-8);
tv.userData.type="tv";
house.add(tv);

// CLICK SYSTEM (TV → NEWS)
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("click",e=>{
 if(firstPerson){
  document.body.requestPointerLock();
 }

 mouse.x=(e.clientX/innerWidth)*2-1;
 mouse.y=-(e.clientY/innerHeight)*2+1;

 raycaster.setFromCamera(mouse,camera);
 let hit=raycaster.intersectObjects([tv]);

 if(hit.length){
  tvVideo.src="news.mp4";
  tvVideo.play();
 }
});

//////////////////////////////
// 🎮 CONTROLS
//////////////////////////////
let keys={};
window.onkeydown=e=>{
 keys[e.key.toLowerCase()]=true;
 if(e.key==="h") firstPerson=true;
 if(e.key==="j") firstPerson=false;
};
window.onkeyup=e=>keys[e.key.toLowerCase()]=false;

// 🖱 MOUSE LOOK (ONLY FIRST PERSON)
document.addEventListener("mousemove",e=>{
 if(!firstPerson) return;

 yaw -= e.movementX * 0.002;
 pitch -= e.movementY * 0.002;

 pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

//////////////////////////////
// 📱 TELEPORT
//////////////////////////////
function teleportHouse(){
 player.position.set(50,2,0);
 phoneUI.style.display="none";
}

//////////////////////////////
// LOOP
//////////////////////////////
function animate(){
 requestAnimationFrame(animate);

 if(keys["w"]) player.position.z-=0.3;
 if(keys["s"]) player.position.z+=0.3;
 if(keys["a"]) player.position.x-=0.3;
 if(keys["d"]) player.position.x+=0.3;

 if(firstPerson){
  player.visible=false;

  camera.position.set(
    player.position.x,
    player.position.y+1.6,
    player.position.z
  );

  camera.rotation.set(pitch,yaw,0);

 }else{
  player.visible=true;

  camera.position.set(
    player.position.x,
    player.position.y+6,
    player.position.z+12
  );

  camera.lookAt(player.position);
 }

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
