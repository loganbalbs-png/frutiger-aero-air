<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air 3D+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
}
</style>
</head>
<body>
<div id="ui">Explore portals 🌐 | Drag to look</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87e8ff, 10, 100);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// LIGHTING (Frutiger Aero vibe)
const sun = new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(10,20,10);
sun.castShadow = true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0xaaffff,0.6));

// PLAYER (Roblox-style block)
const player = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,2,0.6),
  new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y = 2;

const head = new THREE.Mesh(
  new THREE.BoxGeometry(0.8,0.8,0.8),
  new THREE.MeshStandardMaterial({color:0xfff0d0})
);
head.position.y = 3.4;

player.add(body);
player.add(head);
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x88ffcc})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CLOUDS
let clouds=[];
for(let i=0;i<12;i++){
  let c = new THREE.Mesh(
    new THREE.BoxGeometry(3,0.5,3),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  c.position.set((Math.random()-0.5)*40,4+i*2,(Math.random()-0.5)*40);
  scene.add(c);
  clouds.push(c);
}

// BUBBLES
let bubbles=[];
for(let i=0;i<6;i++){
  let b = new THREE.Mesh(
    new THREE.SphereGeometry(1,32,32),
    new THREE.MeshStandardMaterial({
      color:0x99ffff,
      transparent:true,
      opacity:0.4
    })
  );
  b.position.set((Math.random()-0.5)*30,6,(Math.random()-0.5)*30);
  scene.add(b);
  bubbles.push(b);
}

// PORTALS (mini games)
let portals=[];
const colors=[0xff66ff,0x66ffcc,0x6699ff];

for(let i=0;i<3;i++){
  let p = new THREE.Mesh(
    new THREE.CylinderGeometry(1,1,0.2,32),
    new THREE.MeshStandardMaterial({color:colors[i], emissive:colors[i]})
  );
  p.position.set(i*6-6,1,(Math.random()-0.5)*10);
  scene.add(p);
  portals.push(p);
}

// CONTROLS
let keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// CAMERA ROTATION
let yaw=0, pitch=0;
let dragging=false;

window.addEventListener("mousedown",()=>dragging=true);
window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{
 if(dragging){
  yaw -= e.movementX*0.002;
  pitch -= e.movementY*0.002;
  pitch=Math.max(-1.2,Math.min(1.2,pitch));
 }
});

// TOUCH
let lx,ly;
window.addEventListener("touchstart",(e)=>{
 dragging=true;
 lx=e.touches[0].clientX;
 ly=e.touches[0].clientY;
});
window.addEventListener("touchmove",(e)=>{
 if(!dragging)return;
 let dx=e.touches[0].clientX-lx;
 let dy=e.touches[0].clientY-ly;
 yaw -= dx*0.005;
 pitch -= dy*0.005;
 lx=e.touches[0].clientX;
 ly=e.touches[0].clientY;
});
window.addEventListener("touchend",()=>dragging=false);

// PHYSICS
let vy=0;
let gravity=-0.02;
let canJump=false;

function animate(){
 requestAnimationFrame(animate);

 // MOVE
 let forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let right=new THREE.Vector3(forward.z,0,-forward.x);

 if(keys["w"]) player.position.add(forward.clone().multiplyScalar(-0.1));
 if(keys["s"]) player.position.add(forward.clone().multiplyScalar(0.1));
 if(keys["a"]) player.position.add(right.clone().multiplyScalar(-0.1));
 if(keys["d"]) player.position.add(right.clone().multiplyScalar(0.1));

 // GRAVITY
 vy+=gravity;
 player.position.y+=vy;

 if(player.position.y<1){
  player.position.y=1;
  vy=0;
  canJump=true;
 }

 // CLOUDS
 clouds.forEach(c=>{
  if(Math.abs(player.position.x-c.position.x)<2 &&
     Math.abs(player.position.z-c.position.z)<2 &&
     player.position.y>c.position.y &&
     player.position.y<c.position.y+1){
      player.position.y=c.position.y+1;
      vy=0;
      canJump=true;
  }
 });

 // BUBBLES
 bubbles.forEach(b=>{
  if(player.position.distanceTo(b.position)<1.5){
    vy=0.05;
  }
 });

 // PORTALS (teleport)
 portals.forEach((p,i)=>{
  if(player.position.distanceTo(p.position)<1.5){
    player.position.set((Math.random()-0.5)*30,2,(Math.random()-0.5)*30);
    alert("Entered Game "+(i+1)+" 🚀 (more coming soon)");
  }
 });

 // JUMP
 if(keys[" "] && canJump){
  vy=0.35;
  canJump=false;
 }

 // CAMERA
 let offset=new THREE.Vector3(
  Math.sin(yaw)*6,
  3+pitch*2,
  Math.cos(yaw)*6
 );

 camera.position.copy(player.position.clone().add(offset));
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
