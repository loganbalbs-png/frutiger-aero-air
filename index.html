<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87e8ff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// PLAYER
const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5, 1.5, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);
player.position.set(0,2,0);
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({ color: 0x88ffcc })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CLOUDS
let clouds = [];
for (let i=0;i<10;i++){
  let cloud = new THREE.Mesh(
    new THREE.BoxGeometry(3,0.5,3),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  cloud.position.set(
    (Math.random()-0.5)*30,
    3 + i*2,
    (Math.random()-0.5)*30
  );
  scene.add(cloud);
  clouds.push(cloud);
}

// BUBBLES
let bubbles = [];
for (let i=0;i<5;i++){
  let bubble = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({
      color: 0x99ffff,
      transparent:true,
      opacity:0.5
    })
  );
  bubble.position.set(
    (Math.random()-0.5)*20,
    5,
    (Math.random()-0.5)*20
  );
  scene.add(bubble);
  bubbles.push(bubble);
}

// CONTROLS
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// CAMERA ROTATION
let yaw = 0;
let pitch = 0;

let isDragging = false;

window.addEventListener("mousedown", ()=> isDragging = true);
window.addEventListener("mouseup", ()=> isDragging = false);
window.addEventListener("mousemove", (e)=>{
  if(isDragging){
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
  }
});

// TOUCH (iPad)
let lastX, lastY;
window.addEventListener("touchstart", (e)=>{
  isDragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

window.addEventListener("touchmove", (e)=>{
  if(!isDragging) return;

  let dx = e.touches[0].clientX - lastX;
  let dy = e.touches[0].clientY - lastY;

  yaw -= dx * 0.005;
  pitch -= dy * 0.005;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

window.addEventListener("touchend", ()=> isDragging = false);

// PHYSICS
let velocityY = 0;
let gravity = -0.02;
let canJump = false;

function animate(){
  requestAnimationFrame(animate);

  // MOVE relative to camera
  let forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  let right = new THREE.Vector3(forward.z, 0, -forward.x);

  if(keys["w"]) player.position.add(forward.clone().multiplyScalar(-0.1));
  if(keys["s"]) player.position.add(forward.clone().multiplyScalar(0.1));
  if(keys["a"]) player.position.add(right.clone().multiplyScalar(-0.1));
  if(keys["d"]) player.position.add(right.clone().multiplyScalar(0.1));

  // GRAVITY
  velocityY += gravity;
  player.position.y += velocityY;

  if(player.position.y < 2){
    player.position.y = 2;
    velocityY = 0;
    canJump = true;
  }

  // CLOUDS
  clouds.forEach(c=>{
    if(
      Math.abs(player.position.x - c.position.x) < 2 &&
      Math.abs(player.position.z - c.position.z) < 2 &&
      player.position.y > c.position.y &&
      player.position.y < c.position.y + 1
    ){
      player.position.y = c.position.y + 1;
      velocityY = 0;
      canJump = true;
    }
  });

  // BUBBLES
  bubbles.forEach(b=>{
    if(player.position.distanceTo(b.position) < 1.5){
      velocityY = 0.05;
    }
  });

  // JUMP
  if(keys[" "] && canJump){
    velocityY = 0.3;
    canJump = false;
  }

  // CAMERA FOLLOW
  let camOffset = new THREE.Vector3(
    Math.sin(yaw) * 5,
    3 + pitch * 2,
    Math.cos(yaw) * 5
  );

  camera.position.copy(player.position.clone().add(camOffset));
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>
