<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

/* JOYSTICK */
#joystick {
 position:absolute;
 bottom:30px;
 left:30px;
 width:100px;
 height:100px;
 background:rgba(255,255,255,0.2);
 border-radius:50%;
}
#stick {
 width:40px;
 height:40px;
 background:white;
 border-radius:50%;
 position:absolute;
 left:30px;
 top:30px;
}

/* JUMP BUTTON */
#jump {
 position:absolute;
 bottom:40px;
 right:40px;
 width:80px;
 height:80px;
 border-radius:50%;
 background:#00ffff;
 font-size:20px;
}

/* PHONE */
#phoneBtn {
 position:absolute;
 top:20px;
 right:20px;
}

#phoneUI {
 display:none;
 position:absolute;
 bottom:100px;
 right:20px;
 width:220px;
 height:380px;
 background:linear-gradient(#4da6ff,#1a75ff);
 border-radius:60px;
 padding:20px;
 box-shadow:0 0 30px #00ffff;
}

.grid {
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
}

.icon {
 width:50px;
 height:50px;
 border-radius:50%;
 background:white;
}
</style>
</head>
<body>

<div id="joystick"><div id="stick"></div></div>
<button id="jump">⬆</button>

<button id="phoneBtn" onclick="togglePhone()">📱</button>

<div id="phoneUI">
<div class="grid">
<div class="icon" onclick="spawnBlock()"></div>
<div class="icon" onclick="spawnTower()"></div>
<div class="icon" onclick="toggleMusic()"></div>
<div class="icon" onclick="teleportSky()"></div>
<div class="icon" onclick="addPoints()"></div>
<div class="icon" onclick="closePhone()"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x6edfff);

// CAMERA
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1.3));
scene.add(new THREE.AmbientLight(0xaaffff,0.7));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ffff})
);
player.position.y=1;
scene.add(player);

// GROUND
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x55ff88})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// 🌆 DETAILED BUILDINGS
let buildings=[];
for(let i=0;i<50;i++){
 let h=Math.random()*20+10;

 let base=new THREE.Mesh(
  new THREE.BoxGeometry(4,h,4),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
 );

 let top=new THREE.Mesh(
  new THREE.SphereGeometry(1.5),
  new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff})
 );

 base.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
 top.position.set(base.position.x,h+1,base.position.z);

 scene.add(base);
 scene.add(top);

 buildings.push(base);
}

// 🎮 JOYSTICK CONTROL
let joyX=0, joyY=0;
let stick=document.getElementById("stick");

document.getElementById("joystick").addEventListener("touchmove",e=>{
 let t=e.touches[0];
 let rect=e.target.getBoundingClientRect();
 joyX=(t.clientX-rect.left-50)/50;
 joyY=(t.clientY-rect.top-50)/50;
 stick.style.left=(joyX*30+30)+"px";
 stick.style.top=(joyY*30+30)+"px";
});

// JUMP
let velocityY=0;
document.getElementById("jump").onclick=()=>{
 if(player.position.y<=1.1) velocityY=0.2;
};

// MUSIC 🎵
let music=new Audio("https://cdn.pixabay.com/audio/2022/10/25/audio_946b9c3b06.mp3");
music.loop=true;
let playing=false;

function toggleMusic(){
 if(!playing){ music.play(); playing=true; }
 else{ music.pause(); playing=false; }
}

// PHONE
function togglePhone(){ phoneUI.style.display="block"; }
function closePhone(){ phoneUI.style.display="none"; }

// BUILDER
function spawnBlock(){
 let o=new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.MeshStandardMaterial({color:0xff00ff})
 );
 o.position.copy(player.position);
 scene.add(o);
}

function spawnTower(){
 let o=new THREE.Mesh(
  new THREE.CylinderGeometry(1,2,10),
  new THREE.MeshStandardMaterial({color:0x00ffff})
 );
 o.position.copy(player.position);
 scene.add(o);
}

function teleportSky(){
 player.position.y=20;
}

function addPoints(){}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 // MOVE
 player.position.x+=joyX*0.2;
 player.position.z+=joyY*0.2;

 // GRAVITY
 velocityY-=0.01;
 player.position.y+=velocityY;
 if(player.position.y<1){player.position.y=1; velocityY=0;}

 camera.position.set(player.position.x,player.position.y+6,player.position.z+10);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
