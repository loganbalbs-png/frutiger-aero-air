<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }

/* JOYSTICK */
#joy {
 position:absolute;
 bottom:30px;
 left:30px;
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.25);
 backdrop-filter: blur(6px);
}
#stick {
 width:50px;
 height:50px;
 border-radius:50%;
 background:white;
 position:absolute;
 left:35px;
 top:35px;
}

/* BUTTONS */
#jump {
 position:absolute;
 bottom:40px;
 right:40px;
 width:90px;
 height:90px;
 border-radius:50%;
 background:linear-gradient(#00ffff,#0088ff);
 color:white;
 font-size:20px;
}

/* PHONE */
#phoneBtn {
 position:absolute;
 top:20px;
 right:20px;
 font-size:20px;
}

#phoneUI {
 display:none;
 position:absolute;
 bottom:80px;
 right:20px;
 width:260px;
 height:460px;
 border-radius:70px;
 background:linear-gradient(#6edfff,#0055ff);
 box-shadow:0 0 40px #00ccff;
 padding:20px;
}

.app {
 width:65px;
 height:65px;
 border-radius:20px;
 background:rgba(255,255,255,0.9);
 display:inline-flex;
 align-items:center;
 justify-content:center;
 margin:6px;
 font-size:22px;
}
</style>
</head>
<body>

<div id="joy"><div id="stick"></div></div>
<button id="jump">⬆</button>

<button id="phoneBtn" onclick="togglePhone()">📱</button>

<div id="phoneUI">
<div class="app">🌆</div>
<div class="app">🫧</div>
<div class="app">🎵</div>
<div class="app" onclick="closePhone()">❌</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87e8ff);
scene.fog = new THREE.Fog(0x87e8ff, 30, 200);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// RENDERER (optimized)
const renderer = new THREE.WebGLRenderer({
 antialias:true,
 powerPreference:"high-performance"
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(window.devicePixelRatio * 0.8);
document.body.appendChild(renderer.domElement);

// LIGHTING (better look)
const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(50,100,50);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xffffff, 0x88ccff, 0.8));

// PLAYER (better avatar)
const player = new THREE.Group();

function part(w,h,d,color,y){
 let m = new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color})
 );
 m.position.y = y;
 return m;
}

let torso = part(1,1.5,0.6,0x00ccff,1.8);
let head = part(0.8,0.8,0.8,0xffe0bd,3);
let leg1 = part(0.3,1,0.3,0x0088ff,0.8);
let leg2 = part(0.3,1,0.3,0x0088ff,0.8);
leg1.position.x=-0.25;
leg2.position.x=0.25;

player.add(torso,head,leg1,leg2);
player.position.y=1;
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x66ffcc})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// WATER (river)
const river = new THREE.Mesh(
 new THREE.PlaneGeometry(200,20),
 new THREE.MeshStandardMaterial({
  color:0x3399ff,
  transparent:true,
  opacity:0.7
 })
);
river.rotation.x = -Math.PI/2;
river.position.z = 30;
scene.add(river);

// BUILDINGS (nicer)
for(let i=0;i<40;i++){
 let h = Math.random()*20+10;
 let b = new THREE.Mesh(
  new THREE.BoxGeometry(4,h,4),
  new THREE.MeshStandardMaterial({
    color:0x99ffff,
    transparent:true,
    opacity:0.5
  })
 );
 b.position.set((Math.random()-0.5)*200, h/2, (Math.random()-0.5)*200);
 scene.add(b);
}

// JOYSTICK (fixed, not inverted)
let joyX=0, joyY=0;

joy.ontouchmove = e=>{
 let t=e.touches[0];
 let r=joy.getBoundingClientRect();
 joyX = (t.clientX - r.left - 60)/60;
 joyY = (t.clientY - r.top - 60)/60;
};

joy.ontouchend = ()=>{
 joyX=0; joyY=0;
};

// CAMERA ROTATION
let dragging=false, lastX=0;
document.addEventListener("touchstart",e=>{
 dragging=true;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchmove",e=>{
 if(!dragging) return;
 let dx=e.touches[0].clientX-lastX;
 player.rotation.y -= dx*0.01;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchend",()=>dragging=false);

// JUMP
let vy=0;
jump.onclick=()=>{
 if(player.position.y<=1.1) vy=0.25;
};

// PHONE
function togglePhone(){ phoneUI.style.display="block"; }
function closePhone(){ phoneUI.style.display="none"; }

// LOOP
function animate(){
 requestAnimationFrame(animate);

 // movement relative to camera
 player.position.x += Math.sin(player.rotation.y)*joyY*0.3;
 player.position.z += Math.cos(player.rotation.y)*joyY*0.3;

 player.position.x += Math.cos(player.rotation.y)*joyX*0.3;
 player.position.z -= Math.sin(player.rotation.y)*joyX*0.3;

 // gravity
 vy -= 0.01;
 player.position.y += vy;
 if(player.position.y < 1){ player.position.y=1; vy=0; }

 camera.position.set(
  player.position.x - Math.sin(player.rotation.y)*8,
  player.position.y + 5,
  player.position.z - Math.cos(player.rotation.y)*8
 );
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
