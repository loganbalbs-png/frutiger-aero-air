<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:sans-serif;
}
button {
  position:absolute;
  bottom:20px;
  left:20px;
  padding:10px;
}
</style>
</head>
<body>

<div id="ui">Frutiger Aero Air 🌿 | Click for music</div>
<button onclick="startMusic()">Play Music</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87e8ff, 20, 150);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTING
const sun = new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(20,30,10);
scene.add(sun);

scene.add(new THREE.AmbientLight(0xaaffff,0.6));

// PLAYER (better avatar)
const player = new THREE.Group();

function part(w,h,d,color,y){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color})
  );
  mesh.position.y = y;
  return mesh;
}

player.add(part(1,1.5,0.5,0x00ffff,2)); // torso
player.add(part(0.7,0.7,0.7,0xffe0bd,3.2)); // head
player.add(part(0.3,1,0.3,0x00ffff,1)); // legs
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x88ffcc})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CITY (Frutiger Aero buildings)
for(let i=0;i<30;i++){
  let b = new THREE.Mesh(
    new THREE.BoxGeometry(2,Math.random()*10+5,2),
    new THREE.MeshStandardMaterial({
      color:0x99ffff,
      transparent:true,
      opacity:0.7
    })
  );
  b.position.set((Math.random()-0.5)*100,5,(Math.random()-0.5)*100);
  scene.add(b);
}

// CLOUDS
let clouds=[];
for(let i=0;i<12;i++){
  let c=new THREE.Mesh(
    new THREE.BoxGeometry(3,0.5,3),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  c.position.set((Math.random()-0.5)*40,4+i*2,(Math.random()-0.5)*40);
  scene.add(c);
  clouds.push(c);
}

// BUBBLES
let bubbles=[];
for(let i=0;i<6;i++){
  let b=new THREE.Mesh(
    new THREE.SphereGeometry(1,32,32),
    new THREE.MeshStandardMaterial({
      color:0x99ffff,
      transparent:true,
      opacity:0.4
    })
  );
  b.position.set((Math.random()-0.5)*30,6,(Math.random()-0.5)*30);
  scene.add(b);
  bubbles.push(b);
}

// SOUND
let music;
function startMusic(){
  music = new Audio("https://cdn.pixabay.com/audio/2023/03/14/audio_5f4b3c9c60.mp3");
  music.loop = true;
  music.volume = 0.5;
  music.play();
}

// CONTROLS
let keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// CAMERA CONTROL
let yaw=0,pitch=0,drag=false;

window.addEventListener("mousedown",()=>drag=true);
window.addEventListener("mouseup",()=>drag=false);

window.addEventListener("mousemove",(e)=>{
 if(drag){
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-1.2,Math.min(1.2,pitch));
 }
});

// PHYSICS
let vy=0,gravity=-0.02,canJump=false;

function animate(){
 requestAnimationFrame(animate);

 let forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let right=new THREE.Vector3(forward.z,0,-forward.x);

 if(keys["w"]) player.position.add(forward.clone().multiplyScalar(-0.15));
 if(keys["s"]) player.position.add(forward.clone().multiplyScalar(0.15));
 if(keys["a"]) player.position.add(right.clone().multiplyScalar(-0.15));
 if(keys["d"]) player.position.add(right.clone().multiplyScalar(0.15));

 vy+=gravity;
 player.position.y+=vy;

 if(player.position.y<1){
  player.position.y=1;
  vy=0;
  canJump=true;
 }

 clouds.forEach(c=>{
  if(Math.abs(player.position.x-c.position.x)<2 &&
     Math.abs(player.position.z-c.position.z)<2 &&
     player.position.y>c.position.y &&
     player.position.y<c.position.y+1){
      player.position.y=c.position.y+1;
      vy=0;
      canJump=true;
  }
 });

 bubbles.forEach(b=>{
  if(player.position.distanceTo(b.position)<1.5){
    vy=0.05;
  }
 });

 if(keys[" "] && canJump){
  vy=0.35;
  canJump=false;
 }

 let offset=new THREE.Vector3(
  Math.sin(yaw)*6,
  3+pitch*2,
  Math.cos(yaw)*6
 );

 camera.position.copy(player.position.clone().add(offset));
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
