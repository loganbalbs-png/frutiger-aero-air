<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }

/* JOYSTICK */
#joy {
 position:absolute;
 bottom:30px;
 left:30px;
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.25);
}
#stick {
 width:50px;
 height:50px;
 border-radius:50%;
 background:white;
 position:absolute;
 left:35px;
 top:35px;
}

/* BUTTON */
#jump {
 position:absolute;
 bottom:40px;
 right:40px;
 width:90px;
 height:90px;
 border-radius:50%;
 background:#00ccff;
}

/* PHONE */
#phoneBtn { position:absolute; top:20px; right:20px; }
#phoneUI {
 display:none;
 position:absolute;
 bottom:80px;
 right:20px;
 width:260px;
 height:460px;
 border-radius:60px;
 background:linear-gradient(#6edfff,#004cff);
 box-shadow:0 0 30px #00ccff;
 padding:20px;
}
.app {
 width:60px;
 height:60px;
 border-radius:20px;
 background:white;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 margin:8px;
}

/* VIDEO WORLD */
#videoWorld {
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:black;
 z-index:9999;
}
</style>
</head>
<body>

<div id="joy"><div id="stick"></div></div>
<button id="jump">⬆</button>

<button id="phoneBtn" onclick="phoneUI.style.display='block'">📱</button>

<div id="phoneUI">
<div class="app" onclick="teleportHouse()">🏠</div>
<div class="app" onclick="teleportOcean()">🫧</div>
<div class="app" onclick="toggleMusic()">🎵</div>
<div class="app" onclick="enterVideoWorld()">🎥</div>
<div class="app" onclick="phoneUI.style.display='none'">❌</div>
</div>

<!-- VIDEO WORLD -->
<div id="videoWorld">
<video id="waterfallVideo" style="width:100%;height:100%;object-fit:cover;" loop playsinline></video>
<button onclick="exitVideo()" style="position:absolute;top:20px;left:20px;">⬅ Back</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87e8ff);

// CAMERA
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x88ccff,1));
scene.add(new THREE.DirectionalLight(0xffffff,1));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ccff})
);
player.position.y=1;
scene.add(player);

// GROUND
let ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x66ffcc})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// 🌊 3D WATERFALL (animated)
let waterGeo=new THREE.PlaneGeometry(10,20,10,10);
let waterMat=new THREE.MeshStandardMaterial({
 color:0x66ccff,
 transparent:true,
 opacity:0.7
});
let waterfall=new THREE.Mesh(waterGeo,waterMat);
waterfall.position.set(0,10,35);
scene.add(waterfall);

// animate waterfall
function animateWater(){
 waterGeo.vertices?.forEach(v=>{
  v.z=Math.sin(Date.now()*0.002+v.y)*0.5;
 });
 if(waterGeo.vertices) waterGeo.verticesNeedUpdate=true;
}

// 🏠 HOUSE TOWER
let tower=new THREE.Mesh(
 new THREE.CylinderGeometry(5,6,20,16),
 new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
);
tower.position.set(30,10,0);
scene.add(tower);

// house room (inside)
let house=new THREE.Mesh(
 new THREE.BoxGeometry(6,4,6),
 new THREE.MeshStandardMaterial({color:0xffffff})
);
house.position.set(30,5,0);
scene.add(house);

// 🏠 TELEPORT
function teleportHouse(){
 player.position.set(30,5,0);
 phoneUI.style.display="none";
}

// 🌊 OCEAN
function teleportOcean(){
 player.position.set(0,5,-100);
}

// 🎵 MUSIC
let music=new Audio("https://cdn.pixabay.com/audio/2022/10/25/audio_946b9c3b06.mp3");
music.loop=true;
function toggleMusic(){ music.paused?music.play():music.pause(); }

// 🎥 VIDEO
const video=document.getElementById("waterfallVideo");
video.src="waterfall.mp4";

function enterVideoWorld(){
 phoneUI.style.display="none";
 renderer.domElement.style.display="none";
 document.getElementById("videoWorld").style.display="block";
 video.play();
}
function exitVideo(){
 document.getElementById("videoWorld").style.display="none";
 renderer.domElement.style.display="block";
 video.pause();
}

// 🎮 JOYSTICK
let joyX=0,joyY=0;
joy.ontouchmove=e=>{
 let t=e.touches[0];
 let r=joy.getBoundingClientRect();
 joyX=(t.clientX-r.left-60)/60;
 joyY=(t.clientY-r.top-60)/60;
};
joy.ontouchend=()=>{joyX=0;joyY=0;};

// ⌨️ WASD CONTROLS
let keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// CAMERA ROTATION
let dragging=false,lastX=0;
document.addEventListener("touchstart",e=>{
 dragging=true;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchmove",e=>{
 if(!dragging)return;
 let dx=e.touches[0].clientX-lastX;
 player.rotation.y-=dx*0.01;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchend",()=>dragging=false);

// JUMP
let vy=0;
jump.onclick=()=>{ if(player.position.y<=1.1) vy=0.25; };

// LOOP
function animate(){
 requestAnimationFrame(animate);

 animateWater();

 let speed=0.3;

 // joystick movement
 player.position.x+=Math.sin(player.rotation.y)*joyY*speed;
 player.position.z+=Math.cos(player.rotation.y)*joyY*speed;
 player.position.x+=Math.cos(player.rotation.y)*joyX*speed;
 player.position.z-=Math.sin(player.rotation.y)*joyX*speed;

 // WASD movement
 if(keys["w"]) {
  player.position.x+=Math.sin(player.rotation.y)*speed;
  player.position.z+=Math.cos(player.rotation.y)*speed;
 }
 if(keys["s"]) {
  player.position.x-=Math.sin(player.rotation.y)*speed;
  player.position.z-=Math.cos(player.rotation.y)*speed;
 }
 if(keys["a"]) {
  player.position.x+=Math.cos(player.rotation.y)*speed;
  player.position.z-=Math.sin(player.rotation.y)*speed;
 }
 if(keys["d"]) {
  player.position.x-=Math.cos(player.rotation.y)*speed;
  player.position.z+=Math.sin(player.rotation.y)*speed;
 }

 // gravity
 vy-=0.01;
 player.position.y+=vy;
 if(player.position.y<1){player.position.y=1;vy=0;}

 camera.position.set(
  player.position.x - Math.sin(player.rotation.y)*8,
  player.position.y + 5,
  player.position.z - Math.cos(player.rotation.y)*8
 );
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
