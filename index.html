<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }

/* JOYSTICK */
#joy {
 position:absolute;
 bottom:30px;
 left:30px;
 width:120px;
 height:120px;
 border-radius:50%;
 background:rgba(255,255,255,0.25);
}
#stick {
 width:50px;
 height:50px;
 border-radius:50%;
 background:white;
 position:absolute;
 left:35px;
 top:35px;
}

/* BUTTON */
#jump {
 position:absolute;
 bottom:40px;
 right:40px;
 width:90px;
 height:90px;
 border-radius:50%;
 background:#00ccff;
}

/* PHONE */
#phoneBtn {
 position:absolute;
 top:20px;
 right:20px;
}
#phoneUI {
 display:none;
 position:absolute;
 bottom:80px;
 right:20px;
 width:260px;
 height:460px;
 border-radius:60px;
 background:linear-gradient(#6edfff,#004cff);
 box-shadow:0 0 30px #00ccff;
 padding:20px;
}
.app {
 width:60px;
 height:60px;
 border-radius:20px;
 background:white;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 margin:8px;
}
</style>
</head>
<body>

<div id="joy"><div id="stick"></div></div>
<button id="jump">⬆</button>

<button id="phoneBtn" onclick="phoneUI.style.display='block'">📱</button>

<div id="phoneUI">
<div class="app" onclick="teleportOcean()">🫧</div>
<div class="app" onclick="toggleMusic()">🎵</div>
<div class="app" onclick="phoneUI.style.display='none'">❌</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87e8ff);

// CAMERA
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x88ccff,1));
scene.add(new THREE.DirectionalLight(0xffffff,1));

// PLAYER (BETTER)
const player = new THREE.Group();

function part(w,h,d,c,y){
 let m=new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color:c})
 );
 m.position.y=y;
 return m;
}

let leg1=part(0.3,1,0.3,0x0088ff,1);
let leg2=part(0.3,1,0.3,0x0088ff,1);
leg1.position.x=-0.2;
leg2.position.x=0.2;

player.add(part(1,1.5,0.5,0x00ccff,2));
player.add(part(0.8,0.8,0.8,0xffe0bd,3));
player.add(leg1,leg2);

player.position.y=1;
scene.add(player);

// GROUND
let ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x66ffcc})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// WATERFALL + RIVER
let river=new THREE.Mesh(
 new THREE.PlaneGeometry(200,20),
 new THREE.MeshStandardMaterial({color:0x3399ff,transparent:true,opacity:0.7})
);
river.rotation.x=-Math.PI/2;
river.position.z=30;
scene.add(river);

let waterfall=new THREE.Mesh(
 new THREE.PlaneGeometry(10,20),
 new THREE.MeshStandardMaterial({color:0x66ccff,transparent:true,opacity:0.6})
);
waterfall.position.set(0,10,35);
scene.add(waterfall);

// BUILDINGS
for(let i=0;i<40;i++){
 let h=Math.random()*20+10;
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(4,h,4),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
 );
 b.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
 scene.add(b);
}

// JOYSTICK FIXED
let joyX=0,joyY=0;

joy.ontouchmove=e=>{
 let t=e.touches[0];
 let r=joy.getBoundingClientRect();
 joyX=(t.clientX-r.left-60)/60;
 joyY=(t.clientY-r.top-60)/60;
};

joy.ontouchend=()=>{
 joyX=0; joyY=0;
};

// CAMERA ROTATION
let dragging=false,lastX=0;
document.addEventListener("touchstart",e=>{
 dragging=true;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchmove",e=>{
 if(!dragging)return;
 let dx=e.touches[0].clientX-lastX;
 player.rotation.y-=dx*0.01;
 lastX=e.touches[0].clientX;
});
document.addEventListener("touchend",()=>dragging=false);

// JUMP
let vy=0;
jump.onclick=()=>{ if(player.position.y<=1.1) vy=0.25; };

// MUSIC
let music=new Audio("https://cdn.pixabay.com/audio/2022/10/25/audio_946b9c3b06.mp3");
music.loop=true;
function toggleMusic(){ music.paused?music.play():music.pause(); }

// OCEAN WORLD
function teleportOcean(){
 player.position.set(0,5,-100);

 for(let i=0;i<10;i++){
  let ring=new THREE.Mesh(
   new THREE.TorusGeometry(2,0.3,16,100),
   new THREE.MeshStandardMaterial({color:0x00ffff})
  );
  ring.position.set(Math.random()*20-10,5,-100+Math.random()*20);
  scene.add(ring);
 }
}

// LOOP
let walk=0;
function animate(){
 requestAnimationFrame(animate);

 let moving=false;

 player.position.x+=Math.sin(player.rotation.y)*joyY*0.3;
 player.position.z+=Math.cos(player.rotation.y)*joyY*0.3;

 player.position.x+=Math.cos(player.rotation.y)*joyX*0.3;
 player.position.z-=Math.sin(player.rotation.y)*joyX*0.3;

 if(Math.abs(joyX)>0.05||Math.abs(joyY)>0.05){
  walk+=0.2;
  leg1.rotation.x=Math.sin(walk);
  leg2.rotation.x=-Math.sin(walk);
 }

 vy-=0.01;
 player.position.y+=vy;
 if(player.position.y<1){player.position.y=1;vy=0;}

 camera.position.set(
  player.position.x - Math.sin(player.rotation.y)*8,
  player.position.y + 5,
  player.position.z - Math.cos(player.rotation.y)*8
 );
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
