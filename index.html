<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air 3D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; overflow: hidden; }
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
}
</style>
</head>
<body>
<div id="info">WASD to move | Space to jump</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87e8ff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// PLAYER
const player = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.5, 1.5, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0xffffff })
);
player.position.y = 2;
scene.add(player);

// GROUND
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({ color: 0x88ffcc })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// CLOUDS
let clouds = [];
for (let i=0;i<10;i++){
  let cloud = new THREE.Mesh(
    new THREE.BoxGeometry(3,0.5,3),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );
  cloud.position.set(
    (Math.random()-0.5)*30,
    3 + i*2,
    (Math.random()-0.5)*30
  );
  scene.add(cloud);
  clouds.push(cloud);
}

// BUBBLES
let bubbles = [];
for (let i=0;i<5;i++){
  let bubble = new THREE.Mesh(
    new THREE.SphereGeometry(1,16,16),
    new THREE.MeshStandardMaterial({
      color: 0x99ffff,
      transparent:true,
      opacity:0.5
    })
  );
  bubble.position.set(
    (Math.random()-0.5)*20,
    5,
    (Math.random()-0.5)*20
  );
  scene.add(bubble);
  bubbles.push(bubble);
}

// CONTROLS
let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let velocityY = 0;
let gravity = -0.02;
let canJump = false;

function animate(){
  requestAnimationFrame(animate);

  // MOVEMENT
  if(keys["w"]) player.position.z -= 0.1;
  if(keys["s"]) player.position.z += 0.1;
  if(keys["a"]) player.position.x -= 0.1;
  if(keys["d"]) player.position.x += 0.1;

  // GRAVITY
  velocityY += gravity;
  player.position.y += velocityY;

  // GROUND COLLISION
  if(player.position.y < 2){
    player.position.y = 2;
    velocityY = 0;
    canJump = true;
  }

  // CLOUD COLLISION
  clouds.forEach(c=>{
    if(
      Math.abs(player.position.x - c.position.x) < 2 &&
      Math.abs(player.position.z - c.position.z) < 2 &&
      player.position.y > c.position.y &&
      player.position.y < c.position.y + 1
    ){
      player.position.y = c.position.y + 1;
      velocityY = 0;
      canJump = true;
    }
  });

  // BUBBLE FLOAT
  bubbles.forEach(b=>{
    if(player.position.distanceTo(b.position) < 1.5){
      velocityY = 0.05;
    }
  });

  // JUMP
  if(keys[" "] && canJump){
    velocityY = 0.3;
    canJump = false;
  }

  // CAMERA FOLLOW
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
