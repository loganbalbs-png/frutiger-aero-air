<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }
#joy {position:absolute;bottom:30px;left:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.25);}
#stick {width:50px;height:50px;background:white;border-radius:50%;position:absolute;left:35px;top:35px;}
#jump {position:absolute;bottom:40px;right:40px;width:90px;height:90px;border-radius:50%;background:#00ccff;}
#phoneBtn {position:absolute;top:20px;right:20px;}
#phoneUI {display:none;position:absolute;bottom:80px;right:20px;width:260px;height:460px;border-radius:60px;background:linear-gradient(#6edfff,#004cff);padding:20px;}
.app {width:60px;height:60px;border-radius:20px;background:white;display:inline-flex;align-items:center;justify-content:center;margin:8px;}
</style>
</head>
<body>

<div id="joy"><div id="stick"></div></div>
<button id="jump">⬆</button>
<button id="phoneBtn" onclick="phoneUI.style.display='block'">📱</button>

<div id="phoneUI">
<div class="app" onclick="teleportHouse()">🏠</div>
<div class="app" onclick="phoneUI.style.display='none'">❌</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87e8ff);

// CAMERA
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);

// RENDERER
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x88ccff,1));
scene.add(new THREE.DirectionalLight(0xffffff,1));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ccff})
);
player.position.y=1;
scene.add(player);

// GROUND
let ground=new THREE.Mesh(
 new THREE.PlaneGeometry(1000,1000),
 new THREE.MeshStandardMaterial({color:0x66ffcc})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

//////////////////////////////////
// 🌆 FRUTIGER TOWERS
//////////////////////////////////
for(let i=0;i<30;i++){
 let h=Math.random()*80+40;
 let tower=new THREE.Mesh(
  new THREE.CylinderGeometry(5,6,h,32),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
 );
 tower.position.set((Math.random()-0.5)*500,h/2,(Math.random()-0.5)*500);
 scene.add(tower);
}

//////////////////////////////////
// 🏠 HOUSE (MULTI FLOOR)
//////////////////////////////////

let houseGroup=new THREE.Group();
houseGroup.position.set(50,0,0);
scene.add(houseGroup);

// FLOOR 1 (living + kitchen)
let floor1=new THREE.Mesh(new THREE.BoxGeometry(20,1,20),
 new THREE.MeshStandardMaterial({color:0xffffff}));
houseGroup.add(floor1);

// couch
let couch=new THREE.Mesh(new THREE.BoxGeometry(5,2,2),
 new THREE.MeshStandardMaterial({color:0x00ccff}));
couch.position.set(-5,1,0);
houseGroup.add(couch);

// TV (video texture)
const video=document.createElement("video");
video.src="waterfall.mp4";
video.loop=true;
video.muted=true;
video.play();

let tvTex=new THREE.VideoTexture(video);
let tv=new THREE.Mesh(
 new THREE.PlaneGeometry(6,4),
 new THREE.MeshBasicMaterial({map:tvTex})
);
tv.position.set(5,4,-8);
houseGroup.add(tv);

// kitchen table
let table=new THREE.Mesh(new THREE.BoxGeometry(4,1,4),
 new THREE.MeshStandardMaterial({color:0xffffff}));
table.position.set(0,1,5);
houseGroup.add(table);

// fruit (clickable)
let fruit=new THREE.Mesh(
 new THREE.SphereGeometry(0.7),
 new THREE.MeshStandardMaterial({color:0x00ffff,transparent:true,opacity:0.7})
);
fruit.position.set(0,2,5);
fruit.userData.food=true;
houseGroup.add(fruit);

//////////////////////////////////
// 🛏 BEDROOM FLOOR
//////////////////////////////////

let floor2=new THREE.Mesh(new THREE.BoxGeometry(20,1,20),
 new THREE.MeshStandardMaterial({color:0xccffee}));
floor2.position.y=10;
houseGroup.add(floor2);

// bed
let bed=new THREE.Mesh(new THREE.BoxGeometry(4,1,6),
 new THREE.MeshStandardMaterial({color:0x00ccff}));
bed.position.set(-5,11,0);
houseGroup.add(bed);

// desk
let desk=new THREE.Mesh(new THREE.BoxGeometry(3,1,2),
 new THREE.MeshStandardMaterial({color:0xffffff}));
desk.position.set(4,11,0);
houseGroup.add(desk);

// chair
let chair=new THREE.Mesh(new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ccff}));
chair.position.set(4,12,2);
houseGroup.add(chair);

// palm tree
let palm=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,2),
 new THREE.MeshStandardMaterial({color:0x8b5a2b}));
palm.position.set(4,12,0);
houseGroup.add(palm);

//////////////////////////////////
// 🚿 BATHROOM
//////////////////////////////////
let sink=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),
 new THREE.MeshStandardMaterial({color:0xffffff}));
sink.position.set(-8,11,5);
houseGroup.add(sink);

let toilet=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),
 new THREE.MeshStandardMaterial({color:0xffffff}));
toilet.position.set(-6,11,5);
houseGroup.add(toilet);

//////////////////////////////////
// 🫧 BUBBLES
//////////////////////////////////
let bubbles=[];
for(let i=0;i<50;i++){
 let b=new THREE.Mesh(
  new THREE.SphereGeometry(0.3),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
 );
 b.position.set(50+(Math.random()*10-5),Math.random()*15,Math.random()*10-5);
 scene.add(b);
 bubbles.push(b);
}

//////////////////////////////////
// 🚶 NPCs
//////////////////////////////////
let npcs=[];
for(let i=0;i<10;i++){
 let npc=new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
 );
 npc.position.set(Math.random()*50-25,1,Math.random()*50-25);
 scene.add(npc);
 npcs.push(npc);
}

//////////////////////////////////
// CONTROLS
//////////////////////////////////
let joyX=0,joyY=0;
joy.ontouchmove=e=>{
 let t=e.touches[0];
 let r=joy.getBoundingClientRect();
 joyX=(t.clientX-r.left-60)/60;
 joyY=(t.clientY-r.top-60)/60;
};
joy.ontouchend=()=>{joyX=0;joyY=0;};

let keys={};
window.onkeydown=e=>keys[e.key]=true;
window.onkeyup=e=>keys[e.key]=false;

//////////////////////////////////
// TELEPORT
//////////////////////////////////
function teleportHouse(){
 player.position.set(50,2,0);
 phoneUI.style.display="none";
}

//////////////////////////////////
// CLICK FOOD
//////////////////////////////////
window.onclick=()=>{
 if(fruit.userData.food){
  alert("You ate a Frutiger fruit!");
 }
};

//////////////////////////////////
// LOOP
//////////////////////////////////
function animate(){
 requestAnimationFrame(animate);

 player.position.x+=joyX*0.3;
 player.position.z+=joyY*0.3;

 if(keys["w"]) player.position.z-=0.3;
 if(keys["s"]) player.position.z+=0.3;
 if(keys["a"]) player.position.x-=0.3;
 if(keys["d"]) player.position.x+=0.3;

 // bubbles move
 bubbles.forEach(b=>{
  b.position.y+=0.02;
  if(b.position.y>20) b.position.y=0;
 });

 // NPC wander
 npcs.forEach(n=>{
  n.position.x+=Math.sin(Date.now()*0.001+n.id)*0.01;
 });

 camera.position.set(player.position.x,player.position.y+10,player.position.z+15);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
