<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

#startScreen {
  position:absolute; width:100%; height:100%;
  background:linear-gradient(#6edfff,#cfffff);
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

#score, #mission {
  position:absolute; right:10px; color:white;
}
#score { top:10px; }
#mission { top:40px; }

#phoneBtn { position:absolute; bottom:20px; right:20px; }

#phoneUI {
  display:none;
  position:absolute; bottom:80px; right:20px;
  width:220px; height:340px;
  background:#4da6ff; border-radius:40px;
  padding:15px; box-shadow:0 0 20px #00ffff;
}

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🌿 Welcome 🌿</h1>
  <button onclick="startGame()">Play</button>
</div>

<div id="score">Aero Points: 0</div>
<div id="mission">Mission: Collect 5 orbs</div>

<button id="phoneBtn" onclick="togglePhone()">📱</button>

<div id="phoneUI">
<div class="grid">
<button onclick="spawnBlock()">⬛</button>
<button onclick="spawnTower()">🏢</button>
<button onclick="moveMode()">✋</button>
<button onclick="teleportCity()">🌆</button>
<button onclick="addPoints()">🪙</button>
<button onclick="closePhone()">❌</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let started=false, score=0, missionStep=0;

function startGame(){
  startScreen.style.display="none";
  started=true;
}

// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87e8ff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.DirectionalLight(0xffffff,1.2));
scene.add(new THREE.AmbientLight(0xaaffff,0.6));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ffff})
);
player.position.y=1;
scene.add(player);

// GROUND
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x55ff88})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// BUILDINGS (SOLID)
let buildings=[];
for(let i=0;i<40;i++){
 let h=Math.random()*20+10;
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(4,h,4),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.6})
 );
 b.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
 scene.add(b);
 buildings.push(b);
}

// ORBS (MISSIONS)
let orbs=[];
for(let i=0;i<10;i++){
 let o=new THREE.Mesh(
  new THREE.SphereGeometry(0.5),
  new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffff00})
 );
 o.position.set((Math.random()-0.5)*100,1,(Math.random()-0.5)*100);
 scene.add(o);
 orbs.push(o);
}

// BUILDER
let objects=[];
let moveSelected=false;
let selected=null;

function spawnBlock(){
 let obj=new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.MeshStandardMaterial({color:0xff00ff})
 );
 obj.position.copy(player.position);
 scene.add(obj);
 objects.push(obj);
}

function spawnTower(){
 let obj=new THREE.Mesh(
  new THREE.CylinderGeometry(1,2,10),
  new THREE.MeshStandardMaterial({color:0x00ffff})
 );
 obj.position.copy(player.position);
 scene.add(obj);
 objects.push(obj);
}

function moveMode(){
 moveSelected=!moveSelected;
}

// PHONE
function togglePhone(){ phoneUI.style.display="block"; }
function closePhone(){ phoneUI.style.display="none"; }

function teleportCity(){ player.position.set(0,1,0); }
function addPoints(){ score+=50; updateUI(); }

// CONTROLS
let keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// COLLISION
function collide(nextPos){
 for(let b of buildings){
  let dist=nextPos.distanceTo(b.position);
  if(dist<3) return true;
 }
 return false;
}

// UI
function updateUI(){
 score.innerText="Aero Points: "+score;
 if(missionStep>=5){
  mission.innerText="Mission Complete! 🎉";
 }
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 if(!started){ renderer.render(scene,camera); return; }

 let next=player.position.clone();

 if(keys["w"]) next.z-=0.3;
 if(keys["s"]) next.z+=0.3;
 if(keys["a"]) next.x-=0.3;
 if(keys["d"]) next.x+=0.3;

 if(!collide(next)) player.position.copy(next);

 // ORB COLLECTION
 orbs.forEach((o,i)=>{
  if(player.position.distanceTo(o.position)<1){
   scene.remove(o);
   orbs.splice(i,1);
   score+=10;
   missionStep++;
   updateUI();
  }
 });

 // BUILDER MOVE
 if(moveSelected && objects.length>0){
  selected=objects[objects.length-1];
  selected.position.copy(player.position);
 }

 camera.position.set(player.position.x,player.position.y+6,player.position.z+10);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
