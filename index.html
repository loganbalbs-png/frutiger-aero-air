<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Aero Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

#score { position:absolute; top:10px; right:10px; color:white; }

#dialogue {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.6);
  padding:15px;
  color:white;
  display:none;
}

#phoneBtn { position:absolute; bottom:20px; right:20px; }

#phoneUI {
  display:none;
  position:absolute;
  bottom:80px;
  right:20px;
  width:220px;
  height:340px;
  background:#4da6ff;
  border-radius:40px;
  padding:15px;
}

.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

</style>
</head>
<body>

<div id="ui">Frutiger Aero Air 🌿</div>
<div id="score">Aero Points: 0</div>
<div id="dialogue"></div>

<button id="phoneBtn" onclick="togglePhone()">📱</button>

<div id="phoneUI">
<div class="grid">
<button onclick="spawnBlock()">⬛</button>
<button onclick="spawnTower()">🏢</button>
<button onclick="toggleMove()">✋</button>
<button onclick="toggleRotate()">🔄</button>
<button onclick="toggleScale()">📏</button>
<button onclick="closePhone()">❌</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x6edfff);
scene.fog=new THREE.Fog(0x6edfff,20,200);

// CAMERA
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTING
scene.add(new THREE.DirectionalLight(0xffffff,1.3));
scene.add(new THREE.AmbientLight(0xaaffff,0.7));

// PLAYER (BETTER AVATAR)
const player=new THREE.Group();

function part(w,h,d,c,y){
 let m=new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color:c})
 );
 m.position.y=y;
 return m;
}

let leg1=part(0.3,1,0.3,0x00ffff,1);
let leg2=part(0.3,1,0.3,0x00ffff,1);
leg1.position.x=-0.2;
leg2.position.x=0.2;

player.add(part(1,1.5,0.5,0x00ffff,2));
player.add(part(0.8,0.8,0.8,0xffe0bd,3.2));
player.add(leg1,leg2);

scene.add(player);

// GROUND
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x55ff88})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// BUILDINGS (SOLID)
let buildings=[];
for(let i=0;i<40;i++){
 let h=Math.random()*20+10;
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(4,h,4),
  new THREE.MeshStandardMaterial({color:0x99ffff,transparent:true,opacity:0.5})
 );
 b.position.set((Math.random()-0.5)*200,h/2,(Math.random()-0.5)*200);
 scene.add(b);
 buildings.push(b);
}

// NPC
const npc=new THREE.Mesh(
 new THREE.SphereGeometry(1),
 new THREE.MeshStandardMaterial({color:0xff66ff})
);
npc.position.set(5,2,5);
scene.add(npc);

let missionStarted=false;

// PHONE
function togglePhone(){ phoneUI.style.display="block"; }
function closePhone(){ phoneUI.style.display="none"; }

// BUILDER
let objects=[];
let mode="none";

function spawnBlock(){
 let o=new THREE.Mesh(
  new THREE.BoxGeometry(2,2,2),
  new THREE.MeshStandardMaterial({color:0xff00ff})
 );
 o.position.copy(player.position);
 scene.add(o);
 objects.push(o);
}

function spawnTower(){
 let o=new THREE.Mesh(
  new THREE.CylinderGeometry(1,2,10),
  new THREE.MeshStandardMaterial({color:0x00ffff})
 );
 o.position.copy(player.position);
 scene.add(o);
 objects.push(o);
}

function toggleMove(){ mode="move"; }
function toggleRotate(){ mode="rotate"; }
function toggleScale(){ mode="scale"; }

// CONTROLS
let keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// COLLISION
function collide(next){
 for(let b of buildings){
  if(next.distanceTo(b.position)<3) return true;
 }
 return false;
}

// SCORE
let score=0;
function updateScore(){
 document.getElementById("score").innerText="Aero Points: "+score;
}

// DIALOGUE
function showDialogue(text){
 let d=document.getElementById("dialogue");
 d.style.display="block";
 d.innerText=text;
 setTimeout(()=>d.style.display="none",3000);
}

// LOOP
let walk=0;

function animate(){
 requestAnimationFrame(animate);

 let next=player.position.clone();

 if(keys["w"]) next.z-=0.3;
 if(keys["s"]) next.z+=0.3;
 if(keys["a"]) next.x-=0.3;
 if(keys["d"]) next.x+=0.3;

 if(!collide(next)) player.position.copy(next);

 // WALK ANIMATION
 if(keys["w"]||keys["s"]||keys["a"]||keys["d"]){
  walk+=0.2;
  leg1.rotation.x=Math.sin(walk);
  leg2.rotation.x=-Math.sin(walk);
 }

 // NPC INTERACTION
 if(player.position.distanceTo(npc.position)<2 && !missionStarted){
  missionStarted=true;
  showDialogue("Collect 5 orbs!");
 }

 // BUILDER MODES
 if(objects.length>0){
  let obj=objects[objects.length-1];

  if(mode==="move") obj.position.copy(player.position);
  if(mode==="rotate") obj.rotation.y+=0.05;
  if(mode==="scale") obj.scale.addScalar(0.01);
 }

 camera.position.set(player.position.x,player.position.y+6,player.position.z+10);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
