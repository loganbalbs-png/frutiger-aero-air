<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frutiger Eco Air</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; }

/* JOYSTICK */
#joy { position:absolute; bottom:30px; left:30px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.2);}
#stick { width:40px; height:40px; background:white; border-radius:50%; position:absolute; left:30px; top:30px; }

/* JUMP */
#jump { position:absolute; bottom:40px; right:40px; width:80px; height:80px; border-radius:50%; background:#00ffcc; }

/* PHONE */
#phoneBtn { position:absolute; top:20px; right:20px; }
#phoneUI {
 display:none;
 position:absolute;
 bottom:100px;
 right:20px;
 width:220px;
 height:380px;
 border-radius:60px;
 background:linear-gradient(#7effc4,#2ecc71);
 box-shadow:0 0 20px #00ffcc;
 padding:15px;
}
</style>
</head>
<body>

<div id="joy"><div id="stick"></div></div>
<button id="jump">⬆</button>
<button id="phoneBtn" onclick="phoneUI.style.display='block'">📱</button>

<div id="phoneUI">
<button onclick="togglePerf()">⚡ FPS</button>
<button onclick="spawnTree()">🌳</button>
<button onclick="toggleMusic()">🎵</button>
<button onclick="phoneUI.style.display='none'">❌</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xb8f5d0);
scene.fog=new THREE.Fog(0xb8f5d0,20,200);

// CAMERA
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);

// RENDERER (OPTIMIZED)
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:"high-performance"});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(window.devicePixelRatio*0.7);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff,0x88ffcc,1));
scene.add(new THREE.DirectionalLight(0xffffff,0.8));

// PLAYER
const player=new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x00ccaa})
);
player.position.y=1;
scene.add(player);

// GROUND
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(500,500),
 new THREE.MeshStandardMaterial({color:0x66ff99})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// 🌳 TREES (ECO STYLE)
function spawnTree(){
 let trunk=new THREE.Mesh(
  new THREE.CylinderGeometry(0.3,0.5,2),
  new THREE.MeshStandardMaterial({color:0x8b5a2b})
 );
 let leaves=new THREE.Mesh(
  new THREE.SphereGeometry(1.5),
  new THREE.MeshStandardMaterial({color:0x00ff88})
 );
 trunk.position.copy(player.position);
 leaves.position.copy(player.position);
 leaves.position.y+=2;
 scene.add(trunk);
 scene.add(leaves);
}

// 🌆 LIGHT ECO BUILDINGS
for(let i=0;i<30;i++){
 let b=new THREE.Mesh(
  new THREE.BoxGeometry(3,Math.random()*10+5,3),
  new THREE.MeshStandardMaterial({color:0xccffee,transparent:true,opacity:0.4})
 );
 b.position.set((Math.random()-0.5)*200,b.geometry.parameters.height/2,(Math.random()-0.5)*200);
 scene.add(b);
}

// 🎮 JOYSTICK
let joyX=0,joyY=0;
document.getElementById("joy").addEventListener("touchmove",e=>{
 let t=e.touches[0];
 let r=e.target.getBoundingClientRect();
 joyX=(t.clientX-r.left-50)/50;
 joyY=(t.clientY-r.top-50)/50;
});

// JUMP
let vy=0;
jump.onclick=()=>{ if(player.position.y<=1.1) vy=0.25; };

// MUSIC
let music=new Audio("https://cdn.pixabay.com/audio/2023/03/14/audio_5f4b3c9c60.mp3");
music.loop=true;
let playing=false;
function toggleMusic(){
 if(!playing){music.play();playing=true;}
 else{music.pause();playing=false;}
}

// PERFORMANCE MODE
let perf=true;
function togglePerf(){
 perf=!perf;
 renderer.setPixelRatio(perf?window.devicePixelRatio*0.7:window.devicePixelRatio);
}

// LOOP
function animate(){
 requestAnimationFrame(animate);

 // MOVE
 player.position.x+=joyX*0.2;
 player.position.z+=joyY*0.2;

 // GRAVITY
 vy-=0.01;
 player.position.y+=vy;
 if(player.position.y<1){player.position.y=1;vy=0;}

 camera.position.set(player.position.x,player.position.y+6,player.position.z+10);
 camera.lookAt(player.position);

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
